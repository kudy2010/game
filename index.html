<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>⚔️ Powder &amp; Steel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#0d0801;min-height:100%;height:100%;}
    /* Prefer dynamic viewport on mobile (iOS Safari address bar). */
    #root{min-height:100vh;}
    @supports (height: 100dvh){
      #root{min-height:100dvh;}
      #loading{height:100dvh;}
    }
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#c8a44a;font-family:Georgia,serif;gap:12px;}
    /* Mobile interaction polish */
    body{-webkit-text-size-adjust:100%;overscroll-behavior-y:none;}
    button, [role="button"]{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

    /* Global UI polish */
    button{min-height:48px}
    button:active{transform:translateY(1px)}
    @media (max-width: 420px){
      button{min-height:52px}
    }

    /* Tooltip (stats) */
    @keyframes psTipIn{from{opacity:0;transform:translate(-50%,6px) scale(0.96)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
    .ps-tip{
      position:absolute;
      bottom:calc(100% + 10px);
      left:50%;
      transform:translateX(-50%);
      width:min(260px, 78vw);
      background:#1a1408;
      border:1px solid #c8a44a;
      border-radius:10px;
      padding:10px 12px;
      z-index:999;
      box-shadow:0 10px 26px rgba(0,0,0,.78), 0 0 18px rgba(200,164,74,.18);
      animation:psTipIn .16s ease-out;
      pointer-events:none;
    }
    /* Mobile readability bump */
    @media (max-width: 480px){
      #root{-webkit-font-smoothing: antialiased;}
    }
    .ps-tip::after{
      content:"";
      position:absolute;
      left:50%;
      top:100%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-top:7px solid #c8a44a;
      filter:drop-shadow(0 6px 8px rgba(0,0,0,.55));
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div style="font-size:42px">⚔️💣</div>
      <div style="font-size:16px">Ładowanie...</div>
    </div>
  </div>

  <!-- React 18 — tylko te dwa pliki potrzebne, ~40KB łącznie -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    // If CDN scripts fail to load (common on iOS offline / blocked networks),
    // the page will otherwise appear to "load forever".
    setTimeout(function () {
      if (window.React && window.ReactDOM) return;
      var el = document.getElementById("loading");
      if (!el) return;
      el.innerHTML =
        '<div style="font-size:18px;line-height:1.35;text-align:center;max-width:520px;padding:0 16px">' +
        '⚠️ Nie udało się załadować biblioteki gry (React z CDN).<br/>' +
        '<span style="color:#7a6030;font-size:13px">Upewnij się, że masz internet i otwierasz grę przez HTTP/HTTPS (np. GitHub Pages albo lokalny serwer), nie jako plik offline.</span>' +
        '</div>';
    }, 3500);
  </script>

  <!-- localStorage polyfill for window.storage -->
  <script>
  window.storage={
    get:function(k){return new Promise(function(res,rej){var v=localStorage.getItem('ps_'+k);if(v===null)rej(new Error('not found'));else res({key:k,value:v});});},
    set:function(k,v){return new Promise(function(res,rej){try{localStorage.setItem('ps_'+k,v);res({key:k,value:v});}catch(e){rej(e);}});},
    delete:function(k){return new Promise(function(res){try{localStorage.removeItem('ps_'+k);}catch(e){}res({key:k,deleted:true});});},
    list:function(p){return new Promise(function(res){var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('ps_')){var s=k.slice(3);if(!p||s.startsWith(p))keys.push(s);}}res({keys:keys});});}
  };
  </script>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  POWDER & STEEL — Struktura plików                               ║
    ║                                                                  ║
    ║  js/audio.js   — Audio Master, SFX, TAVERN_AMB, MUSIC           ║
    ║  js/data.js    — PERKS, CLASSES, QUESTS, ITEMS, DUNGEONS, JOBS  ║
    ║  js/logic.js   — Logika walki, obliczenia statystyk, XP         ║
    ║  js/ui.js      — ANIM_CSS, ICONS, PixelIcon, CharSprite, Style  ║
    ║  js/combat.js  — CombatScreen, DungeonBetween/Reward, LevelUp   ║
    ║  js/screens.js — CharacterSelect, CreateScreen                  ║
    ║  js/tabs.js    — Hero/Quests/Inventory/Shop/Dungeon/Jobs/Tavern ║
    ║  js/app.js     — App (główny komponent) + ReactDOM.createRoot   ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->

  <!-- Game modules — kolejność ma znaczenie (zależności globalne) -->
  <script src="audio.js"></script>
  <script src="data.js"></script>
  <script src="logic.js"></script>
  <script src="ui.js"></script>
  <script src="combat.js"></script>
  <script src="screens.js"></script>
  <script src="tabs.js"></script>
  <script src="app.js"></script>
</body>
</html>
